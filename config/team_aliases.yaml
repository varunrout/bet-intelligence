# Team name alias mapping for Football Market Intelligence System
#
# Structure:
#   canonical_name:         The single authoritative name used throughout the project.
#     fdco:                 Name as it appears in football-data.co.uk CSV files.
#     api_football:         Name as returned by API-Football (verify on first fetch).
#     understat:            Name as it appears on understat.com league pages.
#     short_code:           3-letter abbreviation for display / logging.
#
# IMPORTANT: Verify fdco names against the actual downloaded CSVs.
# If a name does not resolve, add an alias here rather than patching the loader.
# The team_resolver will raise a hard error for unresolved names — never silently skip.

