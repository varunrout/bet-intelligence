# League configuration for Football Market Intelligence System
# Each entry defines one competition and its supported seasons.

competitions:
  epl:
    name: "English Premier League"
    short_code: "EPL"
    country: "England"
    tier: 1
    fdco_code: "E0"          # football-data.co.uk file code
    api_football_id: 39      # API-Football league ID
    seasons:
      - id: "2019/20"
        fdco_season: "1920"  # maps to mmz4281/1920/E0.csv
        start_date: "2019-08-09"
        end_date: "2020-07-26"
      - id: "2020/21"
        fdco_season: "2021"
        start_date: "2020-09-12"
        end_date: "2021-05-23"
      - id: "2021/22"
        fdco_season: "2122"
        start_date: "2021-08-13"
        end_date: "2022-05-22"
      - id: "2022/23"
        fdco_season: "2223"
        start_date: "2022-08-05"
        end_date: "2023-05-28"
      - id: "2023/24"
        fdco_season: "2324"
        start_date: "2023-08-11"
        end_date: "2024-05-19"

# FDCO base URL pattern:
# https://www.football-data.co.uk/mmz4281/{fdco_season}/{fdco_code}.csv
fdco_base_url: "https://www.football-data.co.uk/mmz4281"

# Default target market for this project
default_market: "ou25"

# Bookmakers sourced from football-data.co.uk
# These are the column prefix mappings in the FDCO CSV files.
fdco_bookmakers:
  B365:
    name: "Bet365"
    is_sharp: false
    ou_cols: ["B365>2.5", "B365<2.5"]
    h2a_cols: ["B365H", "B365D", "B365A"]
  P:
    name: "Pinnacle"
    is_sharp: true
    ou_cols: ["P>2.5", "P<2.5"]
    h2a_cols: ["PSH", "PSD", "PSA"]
  BW:
    name: "BetWin"
    is_sharp: false
    ou_cols: []
    h2a_cols: ["BWH", "BWD", "BWA"]
  Avg:
    name: "Market Average"
    is_sharp: false
    ou_cols: ["Avg>2.5", "Avg<2.5"]
    h2a_cols: ["AvgH", "AvgD", "AvgA"]
  Max:
    name: "Market Maximum"
    is_sharp: false
    ou_cols: ["Max>2.5", "Max<2.5"]
    h2a_cols: ["MaxH", "MaxD", "MaxA"]
